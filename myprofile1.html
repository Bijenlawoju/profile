

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bijen Lawoju - Business Card</title>
  <link href="https://fonts.googleapis.com/css?family=Montserrat:400,700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #ece9e6 0%, #ffffff 100%);
      font-family: 'Montserrat', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(60, 60, 90, 0.18);
      padding: 2.5rem 2rem;
      max-width: 350px;
      width: 100%;
      text-align: center;
      transition: box-shadow 0.3s;
    }
    .card:hover {
      box-shadow: 0 16px 48px rgba(60, 60, 90, 0.28);
    }
    .profile-img {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1.2rem;
      background: #f0f0f0;
      display: inline-block;
    }
    .name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #6c63ff;
      margin-bottom: 0.3rem;
    }
    .title {
      font-size: 1.05rem;
      color: #6c63ff;
      margin-bottom: 0.5rem;
    }
    .org {
      font-size: 0.98rem;
      color: #333;
      margin-bottom: 1.1rem;
    }
    .contact {
      font-size: 0.98rem;
      color: #555;
      margin-bottom: 0.7rem;
    }
    .contact a {
      color: #6c63ff;
      text-decoration: none;
      transition: color 0.2s;
    }
    .contact a:hover {
      color: #6c63ff;
    }
    .divider {
      height: 1px;
      background: #ececec;
      margin: 1.2rem 0;
      border: none;
    }
    .social {
      margin-top: 1rem;
    }
    .social a {
      display: inline-block;
      margin: 0 7px;
      transition: transform 0.2s;
    }
    .social a:hover {
      transform: scale(1.15);
    }
    .social img {
      width: 22px;
      height: 22px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="profile.jpg" alt="Bijen Lawoju" class="profile-img">
    <div class="name">Bijen Lawoju</div>
    <div class="title">Technical Team</div>
    <div class="title">Robotics Team</div>
    <div class="title">Panel and Emcee Team</div><br>
    <div class="org">Knowledge Sharing Circle</div>
    <hr class="divider">
    <div class="contact">📧 <a href="mailto:bijenlawoju@gmail.com">bijenlawoju@gmail.com</a></div>
    <div class="contact">📱 <a href="tel:+9779761625423">+977 9761625423</a></div>
    <div class="social">
      <a href="https://www.linkedin.com/in/bijen-lawoju-b1ab02372/" target="_blank" title="LinkedIn">
        <img src="https://cdn-icons-png.flaticon.com/512/174/174857.png" alt="LinkedIn">
      </a>
      <a href="https://www.facebook.com/bijen.lawoju" target="_blank" title="Facebook">
        <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
      </a>
      <a href="https://www.instagram.com/bijenlawoju/" target="_blank" title="Instagram">
        <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
      </a>
    </div>
  </div>
</body>
</html>
